version: '3'
services:
  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=${NETOPSBENCH_INFLUXDB_ORG:-netopsbench}
      - DOCKER_INFLUXDB_INIT_BUCKET=${NETOPSBENCH_GRAFANA_DEFAULT_BUCKET:-netopsbench}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${NETOPSBENCH_INFLUXDB_TOKEN:-replace-me}

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - NETOPSBENCH_GRAFANA_INFLUXDB_URL=${NETOPSBENCH_GRAFANA_INFLUXDB_URL:-http://influxdb:8086}
      - NETOPSBENCH_INFLUXDB_ORG=${NETOPSBENCH_INFLUXDB_ORG:-netopsbench}
      - NETOPSBENCH_GRAFANA_DEFAULT_BUCKET=${NETOPSBENCH_GRAFANA_DEFAULT_BUCKET:-netopsbench}
      - NETOPSBENCH_INFLUXDB_TOKEN=${NETOPSBENCH_INFLUXDB_TOKEN:-replace-me}
    depends_on:
      - influxdb

volumes:
  influxdb-data:
  influxdb-config:
  grafana-data:

